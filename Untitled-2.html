<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nova AI - Gelişmiş Asistan</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e14; display: flex; height: 100vh; color: #e0e0e0; }

  /* Kenar Çubuğu - Nova Teması (Siyah/Koyu Gri) */
  #sidebar {
    width: 260px; background: #151921; border-right: 1px solid #2d333b;
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  #sidebar-header { padding: 20px 15px; border-bottom: 1px solid #2d333b; }
  #sidebar-header h2 { font-size: 18px; font-weight: 700; color: #4facfe; letter-spacing: 1px; }
  #sidebar-header p { font-size: 11px; color: #8b949e; margin-top: 4px; }
  
  #new-chat-btn {
    margin: 15px; padding: 10px; font-size: 13px; cursor: pointer; font-weight: 600;
    border-radius: 8px; background: #1f242d; border: 1px solid #4facfe; color: #4facfe;
    transition: all 0.3s;
  }
  #new-chat-btn:hover { background: #4facfe; color: #fff; }

  #history-list { flex: 1; overflow-y: auto; padding: 5px 10px; }
  .hist-item {
    padding: 10px; border-radius: 8px; font-size: 13px; color: #adbac7;
    cursor: pointer; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .hist-item:hover { background: #22272e; color: #4facfe; }
  .hist-item.active { background: #22272e; color: #fff; border-left: 3px solid #4facfe; }

  /* Ana Panel */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #0b0e14; }
  #top-bar {
    padding: 15px 20px; border-bottom: 1px solid #2d333b;
    display: flex; align-items: center; justify-content: space-between; background: #151921;
  }
  #top-bar span { font-size: 15px; font-weight: 600; color: #fff; }
  #model-badge {
    font-size: 11px; padding: 4px 12px; border-radius: 99px;
    background: rgba(79, 172, 254, 0.1); color: #4facfe; border: 1px solid rgba(79, 172, 254, 0.3);
  }

  /* Mesaj Alanı */
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
  .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.6; position: relative; }
  .msg.user { align-self: flex-end; background: #4facfe; color: #fff; border-bottom-right-radius: 2px; }
  .msg.ai { align-self: flex-start; background: #22272e; color: #adbac7; border: 1px solid #2d333b; border-bottom-left-radius: 2px; }
  .msg-label { font-size: 9px; color: rgba(255,255,255,0.5); margin-bottom: 5px; font-weight: 800; text-transform: uppercase; }

  /* Yazıyor Animasyonu */
  #typing { align-self: flex-start; padding: 12px 16px; border-radius: 15px; background: #22272e; display: none; }
  .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #4facfe; margin: 0 2px; animation: bounce 1.2s infinite; }
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

  /* Giriş Alanı */
  #input-area { padding: 20px; background: #0b0e14; display: flex; gap: 10px; align-items: flex-end; }
  #msg-input {
    flex: 1; resize: none; height: 45px; max-height: 150px;
    padding: 12px 15px; font-size: 14px; border-radius: 12px;
    border: 1px solid #2d333b; background: #1c2128; color: #fff; font-family: inherit;
  }
  #msg-input:focus { outline: none; border-color: #4facfe; }
  #send-btn {
    width: 45px; height: 45px; border-radius: 12px; background: #4facfe;
    border: none; cursor: pointer; color: #fff; transition: 0.3s;
    display: flex; align-items: center; justify-content: center;
  }
  #send-btn:hover { background: #00f2fe; transform: scale(1.05); }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h2 id="ai-name-display">NOVA AI</h2>
    <p>NovaOS — Intelligent Core</p>
  </div>
  <button id="new-chat-btn">⚡ Yeni Frekans</button>
  <div id="history-list"></div>
</div>

<div id="main">
  <div id="top-bar">
    <span id="top-name">NovaBot v10</span>
    <span id="model-badge">Llama 3.3 70B</span>
  </div>
  <div id="messages">
    </div>
  <div id="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <div id="input-area">
    <textarea id="msg-input" placeholder="Nova'ya bir komut ver..."></textarea>
    <button id="send-btn" onclick="sendMessage()">🚀</button>
  </div>
</div>

<script>
  // --- OTOMATİK API AYARI ---
  const CONFIG = {
    apiKey: "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", // Groq API key'ini buraya tırnak içine yapıştır
    model: "llama-3.3-70b-versatile",
    systemPrompt: "Sen NovaBot v10'sun. NovaOS ekosisteminin bir parçasısın. Zeki, teknolojik ve çözüm odaklısın. Yanıtlarını Türkçe ve akıcı bir şekilde ver."
  };

  let conversationHistory = [];
  const messagesEl = document.getElementById('messages');
  const typingEl = document.getElementById('typing');
  const inputEl = document.getElementById('msg-input');

  // Başlangıç mesajı
  window.onload = () => {
    addMsg('ai', 'NovaBot', 'Sistem çevrimiçi. Nova AI birimine hoş geldin. Bugün neyi optimize edelim?');
  };

  function addMsg(role, label, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = `<div class="msg-label">${label}</div>` + text.replace(/\n/g, '<br>');
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    
    // API Key kontrolü
    if (CONFIG.apiKey === "BURAYA_API_KEYINIZI_YAZIN" || !CONFIG.apiKey) {
      addMsg('ai', 'SİSTEM', '❌ Hata: API Anahtarı bulunamadı. Lütfen kodun içindeki CONFIG kısmına anahtarınızı ekleyin.');
      return;
    }

    addMsg('user', 'EYMEN', text);
    inputEl.value = '';
    conversationHistory.push({ role: 'user', content: text });
    
    typingEl.style.display = 'block';
    messagesEl.scrollTop = messagesEl.scrollHeight;
    
    try {
      const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': 'Bearer ' + CONFIG.apiKey 
        },
        body: JSON.stringify({
          model: CONFIG.model,
          messages: [{ role: 'system', content: CONFIG.systemPrompt }, ...conversationHistory],
          temperature: 0.6
        })
      });

      const data = await resp.json();
      if (data.error) throw new Error(data.error.message);
      
      const reply = data.choices[0].message.content;
      conversationHistory.push({ role: 'assistant', content: reply });
      
      typingEl.style.display = 'none';
      addMsg('ai', 'NovaBot', reply);
      
    } catch (e) {
      typingEl.style.display = 'none';
      addMsg('ai', 'HATA', 'Bağlantı kesildi: ' + e.message);
    }
  }

  // Yeni sohbet temizliği
  document.getElementById('new-chat-btn').onclick = () => {
    conversationHistory = [];
    messagesEl.innerHTML = '';
    addMsg('ai', 'NovaBot', 'Bellek temizlendi. Yeni oturum hazır.');
  };

  // Enter ile gönderme
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
